apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ipfs
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://ipfs-shipyard.github.io/ipfs-charts
    chart: ipfs-kubo
    targetRevision: 0.2.0
    helm:
      parameters:
        - name: persistence.enabled
          value: "true"
        - name: persistence.size
          value: 20Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: ipfs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
