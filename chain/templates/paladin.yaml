# Paladin operator chart values (HelmRelease or passed via helm install)
# This CR configures the paladin-operator chart for devnet mode.
mode: devnet
nodeCount: {{ .Values.besu.nodeCount }}

installCRDs: false

operator:
  name: paladin-operator
  namespace: ""
  image:
    repository: docker.io/lfdecentralizedtrust/paladin-operator
    tag: latest
    pullPolicy: Always
  serviceAccount:
    create: true
    automount: true
    annotations: {}
  podSecurityContext:
    runAsNonRoot: true
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8081
      scheme: HTTP
  readinessProbe:
    httpGet:
      path: /readyz
      port: 8081
      scheme: HTTP
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  env:
    - name: CONFIG_PATH
      value: /etc/config
  volumes:
    - name: config
      configMap:
        name: paladin-operator
  volumeMounts:
    - name: config
      mountPath: /etc/config/config.json
      subPath: config.json
  labels:
    control-plane: controller-manager
  annotations: {}
  nodeSelector:
    kubernetes.io/arch: amd64
  tolerations: []
  affinity: {}
  service:
    type: ClusterIP
    port: 80
  configMap:
    dataFile: assets/config.json

prometheus:
  enabled: true
  prometheus:
    namespace: cattle-monitoring-system
  alertmanager:
    enabled: true
  server:
    enabled: false
  pushgateway:
    enabled: false

postgres:
  image:
    repository: postgres
    tag: latest
    pullPolicy: Always

smartContractsReferences:
  notoFactory:
    address: ""
    deployment: {{ if .Values.paladin.domains.noto }}noto-factory{{ else }}""{{ end }}
  zetoFactory:
    address: ""
    deployment: {{ if .Values.paladin.domains.zeto }}zeto-factory{{ else }}""{{ end }}
  penteFactory:
    address: ""
    deployment: {{ if .Values.paladin.domains.pente }}pente-factory{{ else }}""{{ end }}
  registry:
    address: ""
    deployment: registry

paladin:
  nodeNamePrefix: node
  image:
    repository: docker.io/lfdecentralizedtrust/paladin
    tag: {{ .Values.paladin.imageTag }}
    pullPolicy: Always
  labels:
    app: paladin
  baseNodePort: {{ .Values.paladin.baseNodePort }}

besu:
  nodeNamePrefix: node
  image:
    repository: hyperledger/besu
    tag: {{ .Values.besu.imageTag }}
    pullPolicy: Always
  labels:
    app: besu
  baseNodePort: {{ .Values.besu.baseNodePort }}
  config:
    metrics-enabled: true
    metrics-host: "0.0.0.0"
    metrics-port: 9545
    metrics-protocol: "PROMETHEUS"
    metrics-category: "ALL"

devnet:
  besuGenesis:
    chainID: {{ .Values.besu.chainId }}
