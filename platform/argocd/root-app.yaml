apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: onchain-org-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/onchain-org-stack
    targetRevision: HEAD
    path: platform/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
